# Ironbar вЂ” allakazam (desktop) override. Identical to the base config in
# home-manager/dotfiles/config/ironbar/config.toml but with the battery module
# removed (desktop has no battery), mirroring the old hyprpanel per-host setup.

position = "top"
height = 36
anchor_to_edges = true
popup_autohide = true

# в”Ђв”Ђ start в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[[start]]
type = "custom"
class = "dashboard"

[[start.bar]]
type = "button"
name = "dashboard-btn"
label = "у°Ќњ"
on_click = "popup:toggle"

[[start.popup]]
type = "box"
orientation = "vertical"
class = "dashboard-popup"

[[start.popup.widgets]]
type = "label"
label = "Shortcuts"
class = "popup-heading"

[[start.popup.widgets]]
type = "box"
orientation = "horizontal"

[[start.popup.widgets.widgets]]
type = "button"
label = "у°€№ Firefox"
on_click = "!firefox"

[[start.popup.widgets.widgets]]
type = "button"
label = "у°’± Slack"
on_click = "!slack"

[[start.popup.widgets.widgets]]
type = "button"
label = "у°Ђ» Apps"
on_click = "!wofi --show drun"

[[start.popup.widgets]]
type = "label"
label = "Power"
class = "popup-heading"

[[start.popup.widgets]]
type = "box"
orientation = "horizontal"

[[start.popup.widgets.widgets]]
type = "button"
label = "вЏ» Shutdown"
class = "power-shutdown"
on_click = "!systemctl poweroff"

[[start.popup.widgets.widgets]]
type = "button"
label = "у°њ‰ Restart"
class = "power-restart"
on_click = "!systemctl reboot"

[[start.popup.widgets.widgets]]
type = "button"
label = "у°Ќѓ Logout"
class = "power-logout"
on_click = "!hyprctl dispatch exit"

[[start.popup.widgets.widgets]]
type = "button"
label = "у°’І Sleep"
class = "power-sleep"
on_click = "!systemctl suspend"

# Dots instead of numbers: blank labels, circles drawn in style.css
[[start]]
type = "workspaces"
all_monitors = false
sort = "name"
format = ""

# в”Ђв”Ђ center в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[[center]]
type = "music"
player_type = "mpris"
format = "{title} вЂ” {artist}"
truncate = { mode = "end", length = 60 }

# в”Ђв”Ђ end в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[[end]]
type = "volume"
format = "{icon} {percentage}%"

# One icon per device by default (docker bridges, veth, вЂ¦). Desktop is
# wired, so allow both wired and wifi here.
# The module is display-only, so wire the click up to nmtui ourselves.
[[end]]
type = "network_manager"
icon_size = 16
types_whitelist = ["wired", "wifi"]
on_click_left = "ghostty -e nmtui"
tooltip = "Network (click to manage)"

# Icon-only (no "On" label), sized to match the wifi icon
[[end]]
type = "bluetooth"
icon_size = 16

[end.format]
enabled = "у°‚Ї"
disabled = "у°‚І"
connected = "у°‚±"
connected_battery = "у°‚±"

[[end]]
type = "custom"
class = "voxtype"
[[end.bar]]
type = "label"
label = "{{500:/home/hannes/.config/ironbar/scripts/voxtype-icon.sh}}"

[[end]]
type = "custom"
class = "recording"
show_if = "poll:1000:pgrep -x wf-recorder"
[[end.bar]]
type = "label"
label = "{{500:/home/hannes/.config/ironbar/scripts/recording-icon.sh}}"

[[end]]
type = "tray"

[[end]]
type = "custom"
class = "weather"
[[end.bar]]
type = "label"
label = "{{1800000:/home/hannes/.config/ironbar/scripts/weather.sh}}"

[[end]]
type = "clock"
format = "%a %b %d  %H:%M"
format_popup = "%H:%M:%S"
locale = "sv_SE"

[[end]]
type = "notifications"
show_count = true
