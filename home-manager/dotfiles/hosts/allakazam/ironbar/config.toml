# Ironbar — allakazam (desktop) override. Identical to the base config in
# home-manager/dotfiles/config/ironbar/config.toml but with the battery module
# removed (desktop has no battery), mirroring the old hyprpanel per-host setup.

position = "top"
height = 36
anchor_to_edges = true
popup_autohide = true

# ── start ──────────────────────────────────────────────────────────────────
[[start]]
type = "custom"
class = "dashboard"

[[start.bar]]
type = "button"
name = "dashboard-btn"
label = "󰍜"
on_click = "popup:toggle"

[[start.popup]]
type = "box"
orientation = "vertical"
class = "dashboard-popup"

# Header: greeting + date/time, two single-line labels so each centers
# (refreshes every 30s)
[[start.popup.widgets]]
type = "label"
class = "dashboard-greeting"
label = "{{30000:/home/hannes/.config/ironbar/scripts/dashboard-header.sh greeting}}"

[[start.popup.widgets]]
type = "label"
class = "dashboard-date"
label = "{{30000:/home/hannes/.config/ironbar/scripts/dashboard-header.sh date}}"

# ── Quick launch ─────────────────────────────────────────────────────────
[[start.popup.widgets]]
type = "label"
label = "QUICK LAUNCH"
class = "popup-heading"

[[start.popup.widgets]]
type = "box"
orientation = "horizontal"
class = "app-grid"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰈹  Firefox"
class = "app-tile"
on_click = "!firefox"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰒱  Slack"
class = "app-tile"
on_click = "!slack"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰓇  Spotify"
class = "app-tile"
on_click = "!spotify"

[[start.popup.widgets]]
type = "box"
orientation = "horizontal"
class = "app-grid"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰠮  Obsidian"
class = "app-tile"
on_click = "!obsidian"

[[start.popup.widgets.widgets]]
type = "button"
label = "  Terminal"
class = "app-tile"
on_click = "!ghostty"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰀻  All apps"
class = "app-tile"
on_click = "!walker"

# ── System ───────────────────────────────────────────────────────────────
[[start.popup.widgets]]
type = "label"
label = "SYSTEM"
class = "popup-heading"

[[start.popup.widgets]]
type = "label"
class = "dashboard-stats"
label = "{{3000:/home/hannes/.config/ironbar/scripts/dashboard-stats.sh}}"

# ── Power ────────────────────────────────────────────────────────────────
[[start.popup.widgets]]
type = "label"
label = "POWER"
class = "popup-heading"

[[start.popup.widgets]]
type = "box"
orientation = "horizontal"
class = "power-grid"

[[start.popup.widgets.widgets]]
type = "button"
label = "⏻ Shutdown"
class = "power-shutdown"
on_click = "!systemctl poweroff"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰜉 Restart"
class = "power-restart"
on_click = "!systemctl reboot"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰍃 Logout"
class = "power-logout"
on_click = "!hyprctl dispatch exit"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰒲 Sleep"
class = "power-sleep"
on_click = "!systemctl suspend"

# Dots instead of numbers: blank labels, circles drawn in style.css
[[start]]
type = "workspaces"
all_monitors = false
sort = "name"
format = ""

# ── center ─────────────────────────────────────────────────────────────────
[[center]]
type = "music"
player_type = "mpris"
format = "{title} — {artist}"
truncate = { mode = "end", length = 60 }

# ── end ────────────────────────────────────────────────────────────────────
[[end]]
type = "volume"
format = "<span foreground='#68b5ab'>{icon}</span> {percentage}%"

# One icon per device by default (docker bridges, veth, …). Desktop is
# wired, so allow both wired and wifi here.
# The module is display-only, so wire the click up to nmtui ourselves.
[[end]]
type = "network_manager"
icon_size = 16
types_whitelist = ["wired", "wifi"]
on_click_left = "ghostty -e nmtui"
tooltip = "Network (click to manage)"

# Icon-only (no "On" label), sized to match the wifi icon
[[end]]
type = "bluetooth"
icon_size = 16

[end.format]
enabled = "󰂯"
disabled = "󰂲"
connected = "󰂱"
connected_battery = "󰂱"

[[end]]
type = "custom"
class = "voxtype"
[[end.bar]]
type = "label"
label = "{{500:/home/hannes/.config/ironbar/scripts/voxtype-icon.sh}}"

[[end]]
type = "custom"
class = "recording"
show_if = "poll:1000:pgrep -x wf-recorder"
[[end.bar]]
type = "label"
label = "{{500:/home/hannes/.config/ironbar/scripts/recording-icon.sh}}"

[[end]]
type = "tray"

[[end]]
type = "custom"
class = "weather"
name = "weather"

[[end.bar]]
type = "button"
label = "{{1800000:/home/hannes/.config/ironbar/scripts/weather.sh}}"
on_click = "popup:toggle"

[[end.popup]]
type = "box"
orientation = "vertical"
class = "weather-popup"

[[end.popup.widgets]]
type = "label"
label = "Stockholm"
class = "popup-heading"

[[end.popup.widgets]]
type = "label"
label = "{{1800000:/home/hannes/.config/ironbar/scripts/weather-forecast.sh}}"
class = "forecast"

[[end]]
type = "clock"
format = "%a %b %d  %H:%M"
format_popup = "%H:%M:%S"
locale = "sv_SE"

[[end]]
type = "notifications"
show_count = true
