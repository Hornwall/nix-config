# Ironbar — replaces hyprpanel. Managed by home-manager (dotfiles.nix auto-maps
# everything under dotfiles/config/ into ~/.config/). Theme lives in style.css.
#
# This is the base bar (laptop / has battery). The allakazam host overrides this
# file with a battery-less copy via hornwall.dotfiles.overrides.

position = "top"
height = 36
anchor_to_edges = true
popup_autohide = true

# ── start ──────────────────────────────────────────────────────────────────
# Dashboard / power menu (replaces hyprpanel's "dashboard" module)
[[start]]
type = "custom"
class = "dashboard"

[[start.bar]]
type = "button"
name = "dashboard-btn"
label = "󰍜"
on_click = "popup:toggle"

[[start.popup]]
type = "box"
orientation = "vertical"
class = "dashboard-popup"

[[start.popup.widgets]]
type = "label"
label = "Shortcuts"
class = "popup-heading"

[[start.popup.widgets]]
type = "box"
orientation = "horizontal"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰈹 Firefox"
on_click = "!firefox"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰒱 Slack"
on_click = "!slack"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰀻 Apps"
on_click = "!walker"

[[start.popup.widgets]]
type = "label"
label = "Power"
class = "popup-heading"

[[start.popup.widgets]]
type = "box"
orientation = "horizontal"

[[start.popup.widgets.widgets]]
type = "button"
label = "⏻ Shutdown"
class = "power-shutdown"
on_click = "!systemctl poweroff"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰜉 Restart"
class = "power-restart"
on_click = "!systemctl reboot"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰍃 Logout"
class = "power-logout"
on_click = "!hyprctl dispatch exit"

[[start.popup.widgets.widgets]]
type = "button"
label = "󰒲 Sleep"
class = "power-sleep"
on_click = "!systemctl suspend"

# Workspaces
# Dots instead of numbers: blank labels, circles drawn in style.css
[[start]]
type = "workspaces"
all_monitors = false
sort = "name"
format = ""

# ── center ─────────────────────────────────────────────────────────────────
[[center]]
type = "music"
player_type = "mpris"
format = "{title} — {artist}"
truncate = { mode = "end", length = 60 }

# ── end ────────────────────────────────────────────────────────────────────
[[end]]
type = "volume"
format = "<span foreground='#68b5ab'>{icon}</span> {percentage}%"

# One icon per device by default (docker bridges, veth, …) — wifi only.
# The module is display-only, so wire the click up to nmtui ourselves.
[[end]]
type = "network_manager"
icon_size = 16
types_whitelist = ["wifi"]
on_click_left = "ghostty -e nmtui"
tooltip = "Network (click to manage)"

# Icon-only (no "On" label), sized to match the wifi icon
[[end]]
type = "bluetooth"
icon_size = 16

[end.format]
enabled = "󰂯"
disabled = "󰂲"
connected = "󰂱"
connected_battery = "󰂱"

[[end]]
type = "battery"
icon_size = 16

# Power profile switcher (power-profiles-daemon). hyprpanel had this in the
# battery menu; ironbar popups can't be extended, so it's its own module.
[[end]]
type = "custom"
class = "power-profile"

[[end.bar]]
type = "button"
label = "{{5000:/home/hannes/.config/ironbar/scripts/power-profile-icon.sh}}"
on_click = "popup:toggle"

[[end.popup]]
type = "box"
orientation = "vertical"
class = "power-profile-popup"

[[end.popup.widgets]]
type = "label"
label = "Power profile: {{2000:powerprofilesctl get}}"
class = "popup-heading"

[[end.popup.widgets]]
type = "button"
label = "󰓅 Performance"
on_click = "!powerprofilesctl set performance"

[[end.popup.widgets]]
type = "button"
label = "󰾅 Balanced"
on_click = "!powerprofilesctl set balanced"

[[end.popup.widgets]]
type = "button"
label = "󰌪 Power saver"
on_click = "!powerprofilesctl set power-saver"

# Voxtype status (custom module; polls the voxtype daemon every 500ms)
[[end]]
type = "custom"
class = "voxtype"
[[end.bar]]
type = "label"
label = "{{500:/home/hannes/.config/ironbar/scripts/voxtype-icon.sh}}"

# Screen-recording indicator — show_if collapses the module entirely
# (margins included) when wf-recorder isn't running
[[end]]
type = "custom"
class = "recording"
show_if = "poll:1000:pgrep -x wf-recorder"
[[end.bar]]
type = "label"
label = "{{500:/home/hannes/.config/ironbar/scripts/recording-icon.sh}}"

# System tray
[[end]]
type = "tray"

# Weather (Stockholm, metric). hyprpanel showed this inside the clock popup,
# which ironbar's clock can't do — so it lives on the bar as its own module.
# Click for hourly + coming-days forecast.
[[end]]
type = "custom"
class = "weather"
name = "weather"

[[end.bar]]
type = "button"
label = "{{1800000:/home/hannes/.config/ironbar/scripts/weather.sh}}"
on_click = "popup:toggle"

[[end.popup]]
type = "box"
orientation = "vertical"
class = "weather-popup"

[[end.popup.widgets]]
type = "label"
label = "Stockholm"
class = "popup-heading"

[[end.popup.widgets]]
type = "label"
label = "{{1800000:/home/hannes/.config/ironbar/scripts/weather-forecast.sh}}"
class = "forecast"

[[end]]
type = "clock"
format = "%a %b %d  %H:%M"
format_popup = "%H:%M:%S"
locale = "sv_SE"

[[end]]
type = "notifications"
show_count = true
