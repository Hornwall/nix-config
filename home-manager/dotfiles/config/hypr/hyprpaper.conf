# hyprpaper 0.8+ config.
#
# The old `preload =` / `wallpaper = <monitor>,<path>` assignment syntax was
# removed in the 0.8 (hyprtoolkit) rewrite and is now silently ignored, which
# produces "Monitor <name> has no target: no wp will be created" and a blank
# desktop. Wallpapers are now declared with a `wallpaper { }` block.
#
# An empty `monitor =` applies to all outputs (the old `,` default).

wallpaper {
    monitor =
    path = /home/hannes/Pictures/autumn_forest.png
    fit_mode = cover
}

# enable splash text rendering over the wallpaper
splash = false

# fully disable ipc
# ipc = off
